version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: octofit-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DB: octofit
    volumes:
      - mongodb_data:/data/db
    networks:
      - octofit-network

networks:
  octofit-network:
    driver: bridge

volumes:
  mongodb_data:
